<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Get in touch with the developer of the World's Best Password Generator.">
        <title>Contact - Password Generator</title>
        <link rel="stylesheet" href="style.css">
        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Karla:wght@600;800&family=Orbitron&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:wght@200;300&family=Karla:wght@600;800&family=Orbitron&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="banner">
            <a href="index.html"><h1>World's Best Password Generator</h1></a>
        </div>
        <!-- Nav -->
        <nav id="navbar">
            <a href="index.html" class="nav-link">Generator</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="contact.html" class="nav-link active">Contact</a>
            <a href="biography.html" class="nav-link">Biography</a>
            <a href="faq.html" class="nav-link">FAQ</a>
        </nav>
        <!-- Text -->
        <div id="wrapper">
            <h2 class="page-heading">Contact</h2>
            <p class="page-text">Email: <a href="mailto:contactdt3795@gmail.com">contactdt3795@gmail.com</a></p>

            <form id="contact_form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Your message" required></textarea>

                <button type="button" onclick="submitForm()">Send Message</button>
            </form>

            <div id="form_result"></div>
        </div>

        <script src="script.js"></script>
        <script>
            function submitForm() {
                const name = document.getElementById("name").value.trim()
                const email = document.getElementById("email").value.trim()
                const message = document.getElementById("message").value.trim()
                const result = document.getElementById("form_result")

                if (!name || !email || !message) {
                    result.style.display = "block"
                    result.style.backgroundColor = "#2a1a1a"
                    result.style.color = "#f87171"
                    result.textContent = "Please fill enter all information before pressing sending."
                    return
                }

                result.style.display = "block"
                result.style.backgroundColor = "#1a1a2e"
                result.style.color = "#e879f9"
                result.textContent = "Your message has been sent!."

                document.getElementById("contact_form").reset()
            }
        </script>
    </body>
<html lang="en">
