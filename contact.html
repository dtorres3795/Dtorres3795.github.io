<!-- Head -->
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact - Password Generator</title>
        <link rel="stylesheet" href="style.css">

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Karla:wght@600;800&family=Orbitron&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:wght@200;300&family=Karla:wght@600;800&family=Orbitron&display=swap" rel="stylesheet">
    </head>

    <!-- Body -->
    <body>

        <!-- Banner -->
        <div id="banner">
            <h1>World's Best Password Generator</h1>
        </div>

        <!-- Nav -->
        <nav id="navbar">
            <a href="index.html" class="nav-link">Generator</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="contact.html" class="nav-link active">Contact</a>
            <a href="links.html" class="nav-link">Links</a>
            <a href="faq.html" class="nav-link">FAQ</a>
        </nav>

        <!-- Main Content -->
        <div id="wrapper">

            <h2 class="page-heading">Contact</h2>
            <p class="page-text">Have feedback or questions? Fill out the form below.</p>

            <!-- Contact Form -->
            <form id="contact_form" onsubmit="submit_form(event)">

                <label for="name_input">Name</label>
                <input type="text" id="name_input" name="name" placeholder="Your name" required>

                <label for="email_input">Email</label>
                <input type="email" id="email_input" name="email" placeholder="Your email" required>

                <label for="message_input">Message</label>
                <textarea id="message_input" name="message" placeholder="Your message" rows="5" required></textarea>

                <button type="submit">Send Message</button>

            </form>

            <div id="form_result"></div>

        </div>

        <script src="script.js"></script>
    </body>
</html>
